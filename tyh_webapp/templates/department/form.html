{% extends "base.html" %}
{% block title %}{% if dept %}编辑部门{% else %}新增部门{% endif %}{% endblock %}
{% block content %}
<h5 class="mb-3"><i class="bi bi-{% if dept %}pencil{% else %}plus-lg{% endif %}"></i> {% if dept %}编辑部门{% else %}新增部门{% endif %}</h5>
<div class="card shadow-sm"><div class="card-body p-4">
<form method="POST">
    <div class="row g-3">
        <div class="col-md-4">
            <label class="form-label">部门编号 <span class="text-danger">*</span></label>
            <input type="text" name="dno" class="form-control" maxlength="10"
                   value="{{ dept.dno if dept else '' }}" required {% if dept %}readonly{% endif %}>
        </div>
        <div class="col-md-4">
            <label class="form-label">部门名称 <span class="text-danger">*</span></label>
            <input type="text" name="dname" class="form-control" maxlength="15"
                   value="{{ dept.dname if dept else '' }}" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">部门主管 <span class="text-danger">*</span></label>
            <input type="text" name="downer" class="form-control" maxlength="15"
                   value="{{ dept.downer if dept else '' }}" required>
        </div>
    </div>
    <div class="mt-4">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
        <a href="{{ url_for('department.list') }}" class="btn btn-outline-secondary">取消</a>
    </div>
</form>
</div></div>
{% endblock %}
