{% extends "base.html" %}
{% block title %}修改密码 - 员工工资管理系统{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <h4 class="mb-4"><i class="bi bi-key"></i> 修改密码</h4>
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">原密码</label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新密码</label>
                        <input type="password" name="new_password" class="form-control" required
                               placeholder="至少8位，含数字+大小写字母+特殊字符">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认新密码</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">确认修改</button>
                    <a href="/" class="btn btn-outline-secondary w-100 mt-2">返回首页</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
