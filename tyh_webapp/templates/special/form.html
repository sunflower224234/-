{% extends "base.html" %}
{% block title %}{% if sp %}编辑专项扣除{% else %}新增专项扣除{% endif %}{% endblock %}
{% block content %}
<h5 class="mb-3"><i class="bi bi-{% if sp %}pencil{% else %}plus-lg{% endif %}"></i> {% if sp %}编辑专项扣除记录{% else %}新增专项扣除记录{% endif %}</h5>
<div class="card shadow-sm"><div class="card-body p-4">
<form method="POST">
    <div class="row g-3">
        <div class="col-md-4"><label class="form-label">记录编号 <span class="text-danger">*</span></label><input type="text" name="sno" class="form-control" maxlength="15" value="{{ sp.sno if sp else '' }}" required {% if sp %}readonly{% endif %}></div>
        <div class="col-md-4">
            <label class="form-label">员工 <span class="text-danger">*</span></label>
            <select name="eno" class="form-select" required>
                {% for e in employees %}
                <option value="{{ e[0] }}" {% if sp and sp.eno==e[0] %}selected{% endif %}>{{ e[0] }} - {{ e[1] }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4"><label class="form-label">年度</label><input type="number" name="year" class="form-control" value="{{ sp.year if sp else '' }}" min="2020" max="2100" required></div>
        <div class="col-md-3"><label class="form-label">子女教育</label><input type="number" step="0.01" name="childedu" class="form-control" value="{{ sp.childedu if sp else '0' }}"></div>
        <div class="col-md-3"><label class="form-label">继续教育</label><input type="number" step="0.01" name="continueedu" class="form-control" value="{{ sp.continueedu if sp else '0' }}"></div>
        <div class="col-md-3"><label class="form-label">大病医疗</label><input type="number" step="0.01" name="medical" class="form-control" value="{{ sp.medical if sp else '0' }}"></div>
        <div class="col-md-3"><label class="form-label">住房贷款</label><input type="number" step="0.01" name="houseloans" class="form-control" value="{{ sp.houseloans if sp else '0' }}"></div>
        <div class="col-md-3"><label class="form-label">住房租金</label><input type="number" step="0.01" name="houserent" class="form-control" value="{{ sp.houserent if sp else '0' }}"></div>
        <div class="col-md-3"><label class="form-label">赡养老人</label><input type="number" step="0.01" name="elderly" class="form-control" value="{{ sp.elderly if sp else '0' }}"></div>
        <div class="col-md-3"><label class="form-label">婴幼儿照护</label><input type="number" step="0.01" name="childcare" class="form-control" value="{{ sp.childcare if sp else '0' }}"></div>
    </div>
    <div class="mt-4">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
        <a href="{{ url_for('special.list') }}" class="btn btn-outline-secondary">取消</a>
    </div>
</form>
</div></div>
{% endblock %}
