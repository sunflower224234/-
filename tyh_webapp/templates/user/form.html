{% extends "base.html" %}
{% block title %}{% if user_data %}编辑用户{% else %}新建用户{% endif %}{% endblock %}
{% block content %}
<h5 class="mb-3"><i class="bi bi-{% if user_data %}pencil{% else %}plus-lg{% endif %}"></i> {% if user_data %}编辑用户：{{ user_data.username }}{% else %}新建用户{% endif %}</h5>
<div class="card shadow-sm"><div class="card-body p-4">
<form method="POST">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">用户名 <span class="text-danger">*</span></label>
            <input type="text" name="username" class="form-control" maxlength="255"
                   value="{{ user_data.username if user_data else '' }}" required {% if user_data %}readonly{% endif %}>
        </div>
        {% if not user_data %}
        <div class="col-md-6">
            <label class="form-label">密码 <span class="text-danger">*</span></label>
            <input type="password" name="password" class="form-control" required
                   placeholder="至少8位，含数字+大小写+特殊字符">
        </div>
        {% endif %}
        <div class="col-md-6">
            <label class="form-label">关联员工</label>
            <select name="eno" class="form-select">
                <option value="">-- 不关联（系统用户）--</option>
                {% for e in employees %}
                <option value="{{ e[0] }}" {% if user_data and user_data.eno==e[0] %}selected{% endif %}>{{ e[0] }} - {{ e[1] }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-12">
            <label class="form-label">角色分配 <span class="text-danger">*</span></label>
            <div class="row g-2">
                {% for r in roles %}
                <div class="col-auto">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="role_ids" value="{{ r[0] }}"
                               id="role_{{ r[0] }}"
                               {% if user_data and r[0] in user_data.role_ids %}checked{% endif %}>
                        <label class="form-check-label" for="role_{{ r[0] }}">{{ r[1] }}</label>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
    <div class="mt-4">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
        <a href="{{ url_for('user.list') }}" class="btn btn-outline-secondary">取消</a>
    </div>
</form>
</div></div>
{% endblock %}
